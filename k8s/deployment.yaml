apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend-web
  namespace: grupo24
spec:
  replicas: 2
  selector:
    matchLabels:
      app: backend-web
  template:
    metadata:
      labels:
        app: backend-web
    spec:
      imagePullSecrets:
      - name: ghcr-secret
      containers:
      - name: backend-web
        image: ghcr.io/luis-bu/backend-web:latest
        ports:
        - containerPort: 8080
---
apiVersion: v1
kind: Service
metadata:
  name: backend-web
  namespace: grupo24
spec:
  selector:
    app: backend-web
  ports:
    - protocol: TCP
      port: 8080
      targetPort: 8080
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: backend-web
  namespace: grupo24
spec:
  ingressClassName: public
  rules:
  - host: grupo24.inphotech.co
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: backend-web
            port:
              number: 8080